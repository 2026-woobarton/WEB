name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages 배포에 필요한 최소 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 배포는 한 번에 하나만. 진행 중인 것을 취소하지는 않습니다.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # .env 는 커밋되지 않으므로 여기서는 VITE_OPENAI_API_KEY 가 비어 있습니다.
      # 따라서 번들에 키가 들어가지 않고, 방문자가 설정창에서 자기 키를 입력합니다.
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
